<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 480px;
      height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #152238 0%, #0a1628 100%);
      border-radius: 18px;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      -webkit-app-region: drag;
    }
    .container {
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(56, 130, 220, 0.35);
      animation: pulse 1.8s ease-in-out infinite, glow 1.8s ease-in-out infinite;
      overflow: hidden;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 4px;
      background: linear-gradient(90deg, #a0c4f0, #3882dc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 12px;
      color: #7b8fa8;
      margin-bottom: 28px;
    }
    .loader {
      width: 160px;
      height: 3px;
      margin: 0 auto;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #3882dc, #5ba0f5);
      border-radius: 3px;
      animation: load 1.6s ease-in-out infinite;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 8px 32px rgba(56,130,220,0.35); }
      50% { box-shadow: 0 12px 40px rgba(56,130,220,0.5); }
    }
    @keyframes load {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"><img src="./logo-icon.png" alt="CODEX" style="width:100%;height:100%;object-fit:cover;"></div>
    <h1>CODEX</h1>
    <p>Pravosudni Sistem</p>
    <div class="loader"><div class="loader-bar"></div></div>
  </div>
</body>
</html>
