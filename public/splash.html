<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 480px;
      height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #2a1f0e 0%, #1a1209 100%);
      border-radius: 18px;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      -webkit-app-region: drag;
    }
    .container {
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #e88a1a, #f5a623);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 32px rgba(232, 138, 26, 0.35);
      animation: pulse 1.8s ease-in-out infinite;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 4px;
      background: linear-gradient(90deg, #f5d0a0, #e88a1a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 28px;
    }
    .loader {
      width: 160px;
      height: 3px;
      margin: 0 auto;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #e88a1a, #f5a623);
      border-radius: 3px;
      animation: load 1.6s ease-in-out infinite;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes load {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚖️</div>
    <h1>MEMORIA</h1>
    <p>Pravosudni Dril</p>
    <div class="loader"><div class="loader-bar"></div></div>
  </div>
</body>
</html>
