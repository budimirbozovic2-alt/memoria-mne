</head>

  <body>
    <div id="root">
      <!-- In-app splash that matches Electron splash, hidden once React mounts -->
      <div id="app-splash" style="
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: radial-gradient(ellipse at center, #2a1f0e 0%, #1a1209 100%);
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: #e0e0e0;
        transition: opacity 0.4s ease-out;
      ">
        <div style="text-align: center; animation: appSplashFade 0.5s ease-out;">
          <div style="width: 80px; height: 80px; margin: 0 auto 20px;
            background: linear-gradient(135deg, #e88a1a, #f5a623);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 36px; box-shadow: 0 8px 32px rgba(232, 138, 26, 0.35);
            animation: splashPulse 1.8s ease-in-out infinite;
          ">⚖️</div>
          <h1 style="
            font-size: 22px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px;
            background: linear-gradient(90deg, #f5d0a0, #e88a1a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
          ">MEMORIA</h1>
          <p style="font-size: 12px; color: #9ca3af; margin-bottom: 16px;">Pravosudni Dril</p>
          <p id="splash-status" style="font-size: 11px; color: #9ca3af; margin-bottom: 12px; min-height: 16px;">Pokretanje…</p>
          <div style="width: 200px; height: 4px; margin: 0 auto; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden;">
            <div id="splash-progress" style="width: 0%; height: 100%; background: linear-gradient(90deg, #e88a1a, #f5a623); border-radius: 3px; transition: width 0.3s ease-out;"></div>
          </div>
          <p id="splash-percent" style="font-size: 10px; color: #6b7280; margin-top: 6px;">0%</p>
        </div>
      </div>
      <style>
        @keyframes appSplashFade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes appSplashLoad { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
        @keyframes splashPulse { 0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(232,138,26,0.35); } 50% { transform: scale(1.08); box-shadow: 0 12px 40px rgba(232,138,26,0.5); } }
      </style>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
